name: signal-scanner

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install yfinance pandas numpy requests
      - run: python scanner.py
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT: ${{ secrets.TG_CHAT }}
      - name: save state
        run: |
          git config user.name "scanner-bot"
          git config user.email "bot@users.noreply.github.com"
                    git add state.json log.json paper.json || true

          git diff --cached --quiet || (git commit -m "update state" && git push)
